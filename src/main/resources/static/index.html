<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Task and Resource Planner</title>
    <style>
        /* --- YOUR BASE CSS --- */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        section {
            background-color: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 1px 1px 1px #ddd;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid lightblue;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid lightblue;
            text-align: left;
        }
        th {
            color: black;
        }

        /* --- AUTH CONTAINER VANILLA CSS --- */
        #auth-container {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 1px 1px 1px #ddd;
        }
        #auth-inputs {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin-bottom: 15px;
        }
        #auth-inputs input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid lightblue;
            border-radius: 4px;
            outline: none;
        }

        /* --- OUR NEW CUSTOM BUTTON CSS --- */
        .action-buttons {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn-small {
            padding: 6px 12px;
            border-radius: 4px;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s ease-in-out;
        }
        .btn-blue { background-color: #3b82f6; }
        .btn-blue:hover { background-color: #2563eb; }

        .btn-gray { background-color: #6b7280; }
        .btn-gray:hover { background-color: #4b5563; }

        .btn-green { background-color: #22c55e; }
        .btn-green:hover { background-color: #16a34a; }

        .btn-yellow { background-color: #eab308; }
        .btn-yellow:hover { background-color: #ca8a04; }

        .btn-red { background-color: #ef4444; }
        .btn-red:hover { background-color: #dc2626; }

        .status-done {
            color: #16a34a;
            font-style: italic;
            font-weight: bold;
            margin-right: 8px;
        }

        /* Specific style for the Sort button */
        .btn-main {
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<section id="auth-container">
    <h2 id="auth-title">User Account Control</h2>
    <div id="auth-inputs">
        <input type="text" id="auth-username" placeholder="Username">
        <input type="password" id="auth-password" placeholder="Password">
        <button id="btn-login" class="btn-small btn-blue" style="font-size:16px; padding:10px 20px;">Login</button>
        <button id="btn-register" class="btn-small btn-green" style="font-size:16px; padding:10px 20px;">Register</button>
        <button id="btn-logout" class="btn-small btn-red" style="font-size:16px; padding:10px 20px;">Logout</button>
    </div>
    <p id="user-status" style="margin-top: 10px; font-weight: bold; color: #555;">Status: Not logged in (Using default guest view)</p>
</section>

<section>
    <h2>Create a Task</h2>
    <form id="task-form" action="/tasks" method="POST">
        <input type="text" placeholder="Task Name" name="title">
        <select name="status">
            <option>Pending</option>
            <option>Completed</option>
            <option>Working</option>
        </select>
        <input type="number" placeholder="Priority (1-10)" name="priority" min="1" max="10" required>
        <button class="btn-main" type="button" onclick="document.getElementById('task-form').dispatchEvent(new Event('submit'))">Add Task</button>
    </form>
</section>

<section>
    <h2>Task Board</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th style="text-align:right">Actions</th>
        </tr>
        </thead>
        <tbody id="task-table-body">
        </tbody>
    </table>
</section>

<script>
    // TRACK AUTHENTICATED STATE FROM LOCALSTORAGE
    let currentUserId = localStorage.getItem('currentUserId') || null;
    let currentUsername = localStorage.getItem('currentUsername') || "Guest";

    // 1. The main load function
    function loadTasks(){
        fetch('/tasks', {
            method: 'GET',
            headers: {
                'X-User-Id': currentUserId || ''
            }
        })
            .then(response => response.json())
            .then(tasks => {
                const tableBody = document.getElementById('task-table-body');
                tableBody.innerHTML = '';

                tasks.forEach(task => {
                    let actionButtonHtml = `<div class="action-buttons">`;

                    if(task.status.toLowerCase() === 'pending'){
                        actionButtonHtml += `<button onclick="changeStatus('${task.id}', 'working')" class="btn-small btn-blue">Start Working</button>`;
                    } else if(task.status.toLowerCase() === 'working'){
                        actionButtonHtml += `
                            <button onclick="changeStatus('${task.id}', 'pending')" class="btn-small btn-gray">⏪ Pending</button>
                            <button onclick="changeStatus('${task.id}', 'completed')" class="btn-small btn-green">Mark Completed</button>`;
                    } else if(task.status.toLowerCase() === 'completed'){
                        actionButtonHtml += `
                            <span class="status-done">✔️ Done</span>
                            <button onclick="changeStatus('${task.id}', 'working')" class="btn-small btn-yellow">⏪ Re-open</button>`;
                    }

                    actionButtonHtml += `<button onclick="deleteTask(${task.id})" class="btn-small btn-red">Delete</button></div>`;

                    const row = `<tr>
                        <td>${task.id}</td>
                        <td>${task.title}</td>
                        <td>${task.status}</td>
                        <td>${task.priority}</td>
                        <td>${actionButtonHtml}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => console.error('Error fetching tasks', error));
    }

    // Run custom interface setups along with data fetching on page initialization
    window.onload = function() {
        loadTasks();
        updateAuthUI();
    };

    // 2. The Form Submit Function
    const form = document.getElementById('task-form');
    form.addEventListener('submit', function(event){
        event.preventDefault();

        const titleInput = document.querySelector('input[name="title"]');
        const titleValue = titleInput.value.trim();
        const priorityValue = parseInt(document.querySelector('input[name="priority"]').value);

        if (titleValue === "") {
            alert("Task name is required!");
            return;
        }

        if(priorityValue < 1 || priorityValue > 10 || isNaN(priorityValue)){
            alert("Priority must be a number between 1 to 10");
            return;
        }

        const newTask = {
            title: titleValue,
            status: document.querySelector('select[name="status"]').value,
            priority: priorityValue
        };

        fetch('/tasks',{
            method: 'POST',
            headers: {
                'Content-Type':'application/json',
                'X-User-Id': currentUserId || 1
            },
            body: JSON.stringify(newTask)
        })
            .then(async response => {
                if (!response.ok) {
                    const errorData = await response.json();
                    if(errorData.title) {
                        alert(errorData.title);
                    } else {
                        alert("Something went wrong with validation.");
                    }
                    return;
                }
                loadTasks();
                titleInput.value = ''; // Instantly wipes the task name text field clear!
                document.querySelector('input[name="priority"]').value = '';
            })
            .catch(error => {
                console.error('Network error:', error);
                alert("Could not connect to the server.");
            });
    });

    // STEP 3: REGISTER AND LOGIN CLICK LISTENERS
    document.getElementById('btn-register').addEventListener('click', function() {
        const usernameInput = document.getElementById('auth-username').value.trim();
        const passwordInput = document.getElementById('auth-password').value.trim();

        if (!usernameInput || !passwordInput) {
            alert("Please enter both username and password!");
            return;
        }

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usernameInput, password: passwordInput })
        })
            .then(async response => {
                const data = await response.json();

                if (!response.ok) {
                    // This catches the 409 Conflict or 400 Bad Request and alerts the error message!
                    alert("Registration Failed: " + data.message);
                    return;
                }

                alert(data.message); // "Registration successful"

                // Optional: Clear auth inputs on successful registration
                document.getElementById('auth-username').value = '';
                document.getElementById('auth-password').value = '';
            })
            .catch(err => {
                console.error("Registration error:", err);
                alert("Could not connect to the authentication server.");
            });
    });

    document.getElementById('btn-login').addEventListener('click', function() {
        const usernameInput = document.getElementById('auth-username').value.trim();
        const passwordInput = document.getElementById('auth-password').value.trim();

        if (!usernameInput || !passwordInput) {
            alert("Please enter both username and password!");
            return;
        }

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usernameInput, password: passwordInput })
        })
            .then(async response => {
                if (!response.ok) {
                    const data = await response.json();
                    alert(data.message);
                    return;
                }

                const data = await response.json();
                localStorage.setItem('currentUserId', data.userId);
                localStorage.setItem('currentUsername', data.username);

                currentUserId = data.userId;
                currentUsername = data.username;

                updateAuthUI();
                loadTasks();
                alert("Welcome, " + currentUsername + "!");
            })
            .catch(err => console.error("Login error:", err));
    });

    // Controls display layout toggling safely
    function updateAuthUI() {
        const statusText = document.getElementById('user-status');
        const taskForm = document.getElementById('task-form');
        if (currentUserId) {
            statusText.innerText = `Logged in as: ${currentUsername} (User ID: ${currentUserId})`;
            statusText.style.color = "#22c55e";
            taskForm.style.display = "flex";
        } else {
            statusText.innerText = "Status: Please log in to view or manage your tasks";
            statusText.style.color = "#ef4444";
            taskForm.style.display = "none";
        }
    }

    // 4. Status Update Function
    function changeStatus(id , newStatus){
        fetch(`/tasks/${id}/status?status=${newStatus}`,{
            method: 'PUT',
            headers: {
                'X-User-Id': currentUserId || 1
            }
        })
            .then(response => {
                if(response.ok){
                    loadTasks();
                }
            });
    }

    // 5. Delete Function
    function deleteTask(id){
        if(confirm("Are you sure you want to delete this task?")){
            fetch(`/tasks/${id}`,{
                method: 'DELETE',
                headers: {
                    'X-User-Id': currentUserId || 1
                }
            })
                .then(response => {
                    if(response.ok){
                        loadTasks();
                    }
                });
        }
    }

    // logout listener
    document.getElementById('btn-logout').addEventListener('click', function() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');

        currentUserId = null;
        currentUsername = "Guest";

        updateAuthUI();
        loadTasks();

        alert("Logged out successfully!");
    });
</script>
</body>
</html>
